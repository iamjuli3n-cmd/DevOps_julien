---
# tasks file for roles/app
- name: Run Backend Application
  docker_container:
    name: my-app
    image: "{{ docker_username }}/tp-devops-simple-api:latest"
    pull: true
    recreate: true
    networks:
      - name: app-network
    env:
      USER_DB_URL: "jdbc:postgresql://my-database:5432/{{ db_name }}"
      USER_DB: "{{ db_user }}"
      USER_DB_PASSWORD: "{{ db_password }}"
    restart_policy: always