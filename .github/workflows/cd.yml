name: Continuous Delivery (CD)

on:
  workflow_run:
    workflows: ["Continuous Integration (CI)"] # Écoute le fichier CI pour déclencher ce workflow CD
    types:
      - completed
    branches:
      - main
jobs:
  build-and-push-docker-image:
    if:  >
      github.event.workflow_run.conclusion == 'success' && 
      (github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_BEARER }}

      # 1. Le Backend
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simpleapi
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-simple-api:latest

      # 2. La Database
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./new_app 
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-database:latest

      # 3. Le serveur HTTPD
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./hhtp_server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-httpd:latest