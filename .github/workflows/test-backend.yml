name: Test Backend and Quality Gate

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./simpleapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      # C'est ici qu'on remplace l'ancienne commande par celle de SonarCloud !
      - name: Build and test with Maven and SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=iamjuli3n-cmd_DevOps_julien \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            "-Djacoco.skip=true" \