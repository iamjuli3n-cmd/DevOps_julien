name: CI/CD DevOps Takima

on:
  push:
    branches: 
      - main
      - master
  pull_request:

jobs:
  # JOB 1 : On lance les tests
  test-backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./simpleapi
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      # On utilise l'astuce pour sauter jacoco et les tests de bdd si besoin
      - name: Build and test with Maven
        run: mvn clean verify "-Djacoco.skip=true" "-Dmaven.test.skip=true"

  # JOB 2 : Si les tests passent, on build et on push sur Docker Hub
  build-and-push-docker:
    needs: test-backend # Force GitHub à attendre la réussite du Job 1
    runs-on: ubuntu-24.04
    # Sécurité : On ne push l'image que si on est sur la branche principale (pas sur une PR)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion à ton Docker Hub avec les secrets configurés juste avant
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_BEARER }}

      # Build de l'image à partir de ton Dockerfile et envoi sur le Hub
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./simpleapi # Vérifie bien que c'est le nom de ton dossier
          file: ./simpleapi/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/simple-api-backend:latest