name: Build and Push Images to Docker Hub

on:
  workflow_run:
    workflows: ["Test Backend and Quality Gate"] # Écoute le premier fichier
    types:
      - completed
    branches:
      - main
      - master

jobs:
  build-and-push-docker-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }} # Ne se lance que si les tests ont réussi
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_BEARER_TOKEN }}

      # 1. Le Backend
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simpleapi
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-simple-api:latest

      # 2. La Database (J'ai repris ton dossier ./new_app)
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./new_app 
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-database:latest

      # 3. Le serveur HTTPD (J'ai repris ton dossier ./hhtp_server)
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./hhtp_server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tp-devops-httpd:latest