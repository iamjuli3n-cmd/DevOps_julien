name: Continuous Integration (CI)

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

jobs:
  # JOB 1 : Exécution des tests et compilation fh
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./simpleapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Run Maven Verify (Compile & Tests)
        run: mvn -B clean verify

  # JOB 2 : Analyse de la qualité du code (ne se lance que si le JOB 1 réussit)
  sonar-analysis:
    runs-on: ubuntu-latest
    needs: test-backend
    defaults:
      run:
        working-directory: ./simpleapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      # On met en cache les paquets Maven pour accélérer cette deuxième passe
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # On run le verify ET le scan Sonar à la suite sur cette machine
      - name: Build, Test and Send to SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=iamjuli3n-cmd_DevOps_julien \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}