name: Continuous Integration (CI)

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  # JOB 1 : Exécution des tests et compilation
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./simpleapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Run Maven Verify (Compile & Tests)
        run: mvn -B clean verify

  # JOB 2 : Analyse de la qualité du code (ne se lance que si le JOB 1 réussit)
  sonar-analysis:
    runs-on: ubuntu-latest
    needs: test-backend # 👈 Crée le lien visuel dans l'interface GitHub
    defaults:
      run:
        working-directory: ./simpleapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Désactive le shallow clone pour l'historique Sonar

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Send Analysis to SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=iamjuli3n-cmd_DevOps_julien \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}